version: "3.8"

services:

  postgres:
    image: postgres:15-alpine
    container_name: docger-db
    environment:
      POSTGRES_USER: docger
      POSTGRES_PASSWORD: docgerpass
      POSTGRES_DB: docger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migration.sql:/docker-entrypoint-initdb.d/migration.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docger"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: docger-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@docger.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: docger-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docger-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://docger:docgerpass@postgres:5432/docger?sslmode=disable
      JWT_SECRET: docger_secret_key_2024
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
